name: Daily Auto News

on:
  schedule:
    # 1. 아침 배달: 한국 시간 오전 7시 (서버 지연 대비해 UTC 21:00로 설정)
    - cron: '0 21 * * *'
    
    # 2. 오후 배달: 한국 시간 오후 3시 (UTC 06:00)
    - cron: '0 6 * * *'
    
  workflow_dispatch: # 직접 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python main.py
