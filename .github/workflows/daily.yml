name: Daily Auto News

on:
  schedule:
    - cron: '0 23 * * *' # UTC 기준 (한국 시간 아침 8시 정각)
  workflow_dispatch:      # 직접 테스트해볼 수 있는 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install feedparser requests
      - name: Run Script
        run: python main.py
